# ─── Application identity ───────────────────────────────────────────────────
spring:
  application:
    name: order-processing

  # ─── H2 in-memory datasource (dev / test) ─────────────────────────────────
  datasource:
    url: "jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ─── JPA / Hibernate ──────────────────────────────────────────────────────
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ─── H2 web console (accessible at /h2-console during dev) ───────────────
  h2:
    console:
      enabled: true
      path: /h2-console

# ─── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    com.ecommerce.orderprocessing: DEBUG

